# Trino Iceberg catalog -> Nessie (native connector) -> MinIO/AIStor (S3)
# File name becomes the catalog name in SQL: `lakehouse`.

connector.name=iceberg

# Catalog: Nessie, via Trino's native Nessie connector.
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v2
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=s3://warehouse

# Object storage. MinIO/AIStor speaks S3, so path-style access + a region are required.
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true

# Scoped lakehouse identity from the bootstrap step. NOT the MinIO root user.
# These two values MUST match LAKE_USER / LAKE_PASSWORD in your .env.
s3.aws-access-key=lakehouse
s3.aws-secret-key=change-me-strong-lake-pw
